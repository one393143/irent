<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iRent 互動小遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background-container">
        <!-- 替換為實際圖片路徑，預設使用專案內的圖片 -->
        <img src="img/1280.jpeg" alt="background" class="bg-image">
        <div class="overlay"></div>
    </div>
    
    <div class="app-container" id="app">
        <img src="img/logo.png" alt="iRent Logo" class="logo">
        
        <!-- View 1: 登入頁面 -->
        <div id="login-view" class="view active-view">
            <h1 class="title">準備好出發了嗎？</h1>
            <p class="subtitle" id="status-text">連線中，請稍候...</p>
            <div class="input-group">
                <input type="text" id="nickname-input" placeholder="請輸入您的暱稱" disabled maxlength="15">
                <button id="join-btn" disabled>確認加入</button>
            </div>
        </div>

        <!-- View 2: 等待室 -->
        <div id="waiting-view" class="view">
            <h1 class="title">等待遊戲開始...</h1>
            <div class="waiting-content">
                <div class="main-area">
                    <div class="loader"></div>
                    <p class="subtitle">您已成功加入，請看大螢幕！</p>
                    <p class="my-nickname">您的暱稱: <span id="my-name-display"></span></p>
                </div>
                <!-- 側邊欄顯示其他已加入玩家 -->
                <div class="players-sidebar">
                    <h3>已加入玩家 (<span id="player-count">0</span>)</h3>
                    <ul id="players-list">
                        <!-- 動態加入玩家列表 -->
                    </ul>
                </div>
            </div>
        </div>

        <!-- View 3: 遊戲開始 -->
        <div id="game-view" class="view" style="max-width: 800px; width: 100%;">
            <h1 class="title">iRent 城市調度員</h1>
            <div class="score-board" style="display: flex; justify-content: space-around; margin-bottom: 10px; font-weight: bold; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 10px;">
                <span>存活時間: <span id="game-time" style="color:var(--primary-color)">0</span>s</span>
                <span>沒電車輛: <span id="dead-scooters" style="color:red">0</span>/3</span>
                <span>待命調度員: <span id="free-dispatchers" style="color:blue">3</span></span>
            </div>
            <div class="game-container" style="position: relative; display: flex; justify-content: center; background: url('img/map.jpg') center/cover; border-radius: 10px; overflow: hidden; border: 2px solid var(--glass-border);">
                <!-- 半透明遮罩用來蓋住真實地圖，讓格線清楚 -->
                <div style="position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.7); pointer-events: none;"></div>
                <canvas id="game-canvas" style="position: relative; z-index: 1;"></canvas>
            </div>
            <p class="subtitle" style="margin-top:10px; font-size:1rem; font-weight:bold;">點擊「低電量機車」派遣調度員換電！保護城市交通！</p>
        </div>
    </div>

    <!-- 匯入 Firebase SDK 模組與主程式 -->
    <script type="module" src="js/player.js"></script>
</body>
</html>
