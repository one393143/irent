<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iRent 互動小遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background-container">
        <!-- 替換為實際圖片路徑，預設使用專案內的圖片 -->
        <img src="img/1280.jpeg" alt="background" class="bg-image">
        <div class="overlay"></div>
    </div>
    
    <div class="app-container" id="app">
        <img src="img/logo.png" alt="iRent Logo" class="logo">
        
        <!-- View 1: 登入頁面 -->
        <div id="login-view" class="view active-view">
            <h1 class="title">準備好出發了嗎？</h1>
            <p class="subtitle" id="status-text">連線中，請稍候...</p>
            <div class="input-group">
                <input type="text" id="nickname-input" placeholder="請輸入您的暱稱" disabled maxlength="15">
                <button id="join-btn" disabled>確認加入</button>
            </div>
        </div>

        <!-- View 2: 等待室 -->
        <div id="waiting-view" class="view">
            <h1 class="title">等待遊戲開始...</h1>
            <div class="waiting-content">
                <div class="main-area">
                    <div class="loader"></div>
                    <p class="subtitle">您已成功加入，請看大螢幕！</p>
                    <p class="my-nickname">您的暱稱: <span id="my-name-display"></span></p>
                </div>
                <!-- 側邊欄顯示其他已加入玩家 -->
                <div class="players-sidebar">
                    <h3>已加入玩家 (<span id="player-count">0</span>)</h3>
                    <ul id="players-list">
                        <!-- 動態加入玩家列表 -->
                    </ul>
                </div>
            </div>
        </div>

        <!-- View 3: 遊戲開始 -->
        <div id="game-view" class="view" style="max-width: 500px; width: 100%; position: relative;">
            <h1 class="title">iRent 營運長</h1>
            <div class="score-board" style="display: flex; justify-content: space-around; margin-bottom: 10px; font-weight: bold; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 10px; font-size: 0.9rem;">
                <div>時間: <span id="game-timer" style="color:red">60</span>s</div>
                <div>營收: <span id="game-revenue" style="color:var(--primary-color)">$0</span></div>
                <div>滿意度: <span id="game-satisfaction" style="color:orange">100%</span></div>
                <div>調度員: <span id="free-dispatchers" style="color:blue">2/2</span></div>
            </div>
            <div class="game-container" style="position: relative; display: flex; justify-content: center; background: #fff; border-radius: 10px; overflow: hidden; border: 2px solid var(--glass-border);">
                <canvas id="game-canvas"></canvas>
            </div>
            <p class="subtitle" style="margin-top:10px; font-size:0.9rem; font-weight:bold;">點擊「🟢 閒置」或「🔴 沒電」機車派遣換電！</p>
            
            <!-- 結算視窗 -->
            <div id="settlement-modal" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 10; text-align: center;">
                <h2>遊戲結束</h2>
                <div style="margin: 15px 0; font-size: 1.2rem;">
                    <p>最終營收: <span id="final-revenue" style="color:var(--primary-color); font-weight:bold;">$0</span></p>
                    <p>最終滿意度: <span id="final-satisfaction" style="color:orange; font-weight:bold;">100%</span></p>
                </div>
                <p id="evaluation-text" style="font-weight:bold; margin-bottom: 15px;"></p>
                <button id="restart-btn" style="width: auto; padding: 10px 20px;">重新挑戰</button>
            </div>
        </div>
    </div>

    <!-- 匯入 Firebase SDK 模組與主程式 -->
    <script type="module" src="js/player.js"></script>
</body>
</html>
